spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5433/suadata-base
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  batch:
    jdbc:
      initialize-schema: always
      job:
        enabled: false